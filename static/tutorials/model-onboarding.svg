<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Model onboarding guide</title>
  <desc id="desc">A local model selection workflow showing pull once, then run offline.</desc>
  <rect width="800" height="450" fill="#0b0a12"/>
  <circle cx="681" cy="85" r="58" fill="#7c3aed" opacity=".16"/>
  <circle cx="130" cy="360" r="72" fill="#0ea5e9" opacity=".13"/>
  <rect x="58" y="48" width="684" height="354" rx="16" fill="#111220" stroke="#a855f7" stroke-opacity=".62"/>
  <text x="94" y="104" fill="#f2e8ff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Model onboarding</text>
  <text x="96" y="136" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="17">Choose a local model key, pull it once, then keep runtime offline.</text>
  <g font-family="Arial, sans-serif">
    <rect x="94" y="185" width="188" height="150" rx="10" fill="#17182a" stroke="#38bdf8" stroke-opacity=".6"/>
    <rect x="306" y="185" width="188" height="150" rx="10" fill="#17182a" stroke="#a855f7" stroke-opacity=".6"/>
    <rect x="518" y="185" width="188" height="150" rx="10" fill="#17182a" stroke="#34d399" stroke-opacity=".6"/>
    <text x="188" y="230" fill="#e0f7ff" font-size="20" font-weight="700" text-anchor="middle">1. Select</text>
    <text x="400" y="230" fill="#f0dcff" font-size="20" font-weight="700" text-anchor="middle">2. Pull</text>
    <text x="612" y="230" fill="#dcfff1" font-size="20" font-weight="700" text-anchor="middle">3. Seal</text>
    <text x="188" y="266" fill="#cbd5e1" font-size="14" text-anchor="middle">Set an explicit</text>
    <text x="188" y="287" fill="#cbd5e1" font-size="14" text-anchor="middle">model key</text>
    <text x="400" y="266" fill="#cbd5e1" font-size="14" text-anchor="middle">Download before</text>
    <text x="400" y="287" fill="#cbd5e1" font-size="14" text-anchor="middle">sensitive use</text>
    <text x="612" y="266" fill="#cbd5e1" font-size="14" text-anchor="middle">Run with Docker</text>
    <text x="612" y="287" fill="#cbd5e1" font-size="14" text-anchor="middle">network disabled</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
    <path d="M171 324h34M188 307v34" stroke="#38bdf8"/>
    <path d="M385 316h30M400 301v30M383 301h34" stroke="#a855f7"/>
    <path d="M598 309h28v24h-28zM605 309v-9a7 7 0 0 1 14 0v9" stroke="#34d399"/>
    <path d="M286 260h18M496 260h18" stroke="#64748b"/>
  </g>
  <rect x="96" y="358" width="608" height="28" rx="7" fill="#0c1020" stroke="#4c1d95" stroke-opacity=".65"/>
  <text x="112" y="377" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="13">Cleverly does not assume a default model key. The user chooses it.</text>
</svg>
