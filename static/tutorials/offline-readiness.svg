<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Offline readiness guide</title>
  <desc id="desc">A security dashboard showing local-only checks and a sealed network status.</desc>
  <rect width="800" height="450" fill="#071014"/>
  <path d="M40 70h720M40 140h720M40 210h720M40 280h720M40 350h720M110 30v390M220 30v390M330 30v390M440 30v390M550 30v390M660 30v390" stroke="#13323a" stroke-width="1" opacity=".55"/>
  <rect x="54" y="46" width="692" height="358" rx="16" fill="#0c141c" stroke="#14b8a6" stroke-opacity=".62"/>
  <text x="92" y="104" fill="#eafffb" font-family="Arial, sans-serif" font-size="34" font-weight="700">Offline readiness</text>
  <text x="94" y="136" fill="#76e4d5" font-family="Arial, sans-serif" font-size="17">Verify network, model endpoint, storage, and logs before work starts.</text>
  <circle cx="196" cy="248" r="78" fill="#0f1d22" stroke="#34d399" stroke-width="12"/>
  <text x="196" y="238" fill="#34d399" font-family="Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle">93%</text>
  <text x="196" y="268" fill="#cafff4" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Ready</text>
  <g font-family="Arial, sans-serif" font-size="16">
    <rect x="326" y="186" width="326" height="38" rx="7" fill="#10212b" stroke="#34d399" stroke-opacity=".5"/>
    <rect x="326" y="236" width="326" height="38" rx="7" fill="#10212b" stroke="#34d399" stroke-opacity=".5"/>
    <rect x="326" y="286" width="326" height="38" rx="7" fill="#10212b" stroke="#fbbf24" stroke-opacity=".55"/>
    <text x="374" y="211" fill="#e7fff8">Offline mode enabled</text>
    <text x="374" y="261" fill="#e7fff8">Local model endpoint</text>
    <text x="374" y="311" fill="#fff4ca">Run test after model changes</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
    <path d="m342 204 8 8 18-22" stroke="#34d399"/>
    <path d="m342 254 8 8 18-22" stroke="#34d399"/>
    <path d="M350 296v16" stroke="#fbbf24"/>
    <circle cx="350" cy="318" r="2" stroke="#fbbf24"/>
    <path d="M612 116h42v32h-42zM623 116v-13a10 10 0 0 1 20 0v13" stroke="#76e4d5"/>
  </g>
  <text x="618" y="365" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="13" text-anchor="end">No cloud calls required</text>
</svg>
