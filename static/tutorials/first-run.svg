    <circle cx="658" cy="225" r="32" fill="#0f172a" stroke="#fbbf24" stroke-width="4"/>
    <path d="m130 224 8 8 18-22" stroke="#16c8d8" stroke-width="5"/>
    <path d="M303 236h22M303 224h22M303 212h22" stroke="#a855f7" stroke-width="5"/>
