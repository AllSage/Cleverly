<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">First run setup guide</title>
  <desc id="desc">A local setup flow showing setup, model choice, offline check, and start chatting.</desc>
