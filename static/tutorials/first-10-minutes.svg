<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">First 10 minutes guide</title>
  <desc id="desc">A five-step local setup path for Cleverly showing setup, model, offline proof, backup drill, and first chat.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151827"/>
      <stop offset="1" stop-color="#0b111c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#070b12"/>
  <path d="M0 75h800M0 150h800M0 225h800M0 300h800M0 375h800M80 0v450M160 0v450M240 0v450M320 0v450M400 0v450M480 0v450M560 0v450M640 0v450M720 0v450" stroke="#112436" stroke-width="1" opacity=".5"/>
