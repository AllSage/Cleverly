name: Cleverly CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cleverly-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  release-readiness:
    name: Release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Python tests
        run: python -m pytest -q

      - name: JavaScript syntax checks
        run: |
          Get-ChildItem -LiteralPath static/js -Filter *.js -File | Sort-Object FullName | ForEach-Object {
            node --check $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "node --check failed for $($_.FullName)" }
          }

      - name: PowerShell parser checks
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path . -Recurse -Include *.ps1 -File |
            Where-Object { $_.FullName -notmatch '[\\/](venv|\.venv|dist|node_modules)[\\/]' } |
            Sort-Object FullName
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($file.FullName): $($_.Message)" }
              throw "PowerShell parser check failed for $($file.FullName)"
            }
          }

      - name: Docker Compose config
        run: docker compose config

      - name: Static security scan
        run: ./scripts/run-static-security.ps1 -ReportPath dist/security/static-security-ci.json

      - name: No-network container smoke
        run: ./ci/no-network-container-smoke.ps1 -Image cleverly:ci-no-network -ContainerName cleverly-no-network-smoke

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cleverly-ci-reports
          path: |
            dist/security/static-security-ci.json
            dist/no-network-container-smoke.json
          if-no-files-found: warn
          retention-days: 14
