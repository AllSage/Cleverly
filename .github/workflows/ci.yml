name: Cleverly CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cleverly-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  release-readiness:
    name: Release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Python tests with coverage
        run: |
          python -m coverage run -m pytest -q
          python -m coverage report --fail-under=0
          python -m coverage xml

      - name: JavaScript syntax checks
        run: |
          Get-ChildItem -LiteralPath static -Recurse -Filter *.js -File | Sort-Object FullName | ForEach-Object {
            node --check $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "node --check failed for $($_.FullName)" }
          }

      - name: PowerShell parser checks
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path . -Recurse -Include *.ps1 -File |
            Where-Object { $_.FullName -notmatch '[\\/](venv|\.venv|dist|node_modules)[\\/]' } |
            Sort-Object FullName
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($file.FullName): $($_.Message)" }
              throw "PowerShell parser check failed for $($file.FullName)"
            }
          }

      - name: Docker Compose config
        run: docker compose config

      - name: Static security scan
        run: ./scripts/run-static-security.ps1 -ReportPath dist/security/static-security-ci.json

      - name: No-network container smoke
        run: ./ci/no-network-container-smoke.ps1 -Image cleverly:ci-no-network -ContainerName cleverly-no-network-smoke

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cleverly-ci-reports
          path: |
            dist/security/static-security-ci.json
            dist/no-network-container-smoke.json
            dist/coverage/coverage.xml
          if-no-files-found: warn
          retention-days: 14
