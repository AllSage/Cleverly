name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release or release-candidate label"
        required: true
        default: "manual-rc"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: pwsh

jobs:
  release-artifacts:
    name: Release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm ci

      - name: Build release evidence
        run: |
          ./scripts/build-offline-release.ps1 -SkipBundle -SkipInstaller -Image cleverly:release-ci
          ./scripts/write-release-dashboard.ps1 -ReleaseDir dist/release

      - name: Package release evidence
        run: |
          $version = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.version }}" } else { "${{ github.ref_name }}" }
          $safeVersion = $version -replace '[^A-Za-z0-9._-]', '-'
          $zip = "dist/cleverly-release-$safeVersion.zip"
          if (Test-Path -LiteralPath $zip) { Remove-Item -LiteralPath $zip -Force }
          Compress-Archive -Path dist/release/* -DestinationPath $zip -Force
          "RELEASE_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Attest release archive
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.RELEASE_ZIP }}

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ env.RELEASE_ZIP }}
          sbom-path: dist/release/cleverly-sbom.json

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cleverly-release-evidence
          path: |
            ${{ env.RELEASE_ZIP }}
            dist/release/release-manifest.json
            dist/release/release-dashboard.html
            dist/release/release-dashboard.json
            dist/release/checksums.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseArgs = @(
            "${{ github.ref_name }}",
            "${{ env.RELEASE_ZIP }}",
            "dist/release/checksums.sha256",
            "dist/release/release-dashboard.html",
            "dist/release/release-dashboard.json",
            "--title", "Cleverly ${{ github.ref_name }}",
            "--notes", "Automated release evidence for ${{ github.sha }}. Build offline model bundles and signed installers on the connected release workstation before sensitive-machine deployment.",
            "--verify-tag"
          )
          if ("${{ github.ref_name }}" -match '(^|[-.])rc[0-9]*($|[-.])') {
            $releaseArgs += "--prerelease"
          }
          gh release create @releaseArgs
