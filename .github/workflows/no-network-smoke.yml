name: No-Network Container Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: no-network-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  no-network-container-smoke:
    name: No-network container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run no-network container smoke
        run: ./ci/no-network-container-smoke.ps1 -Image cleverly:ci-no-network -ContainerName cleverly-no-network-smoke

      - name: Upload no-network report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: no-network-container-smoke
          path: dist/no-network-container-smoke.json
          if-no-files-found: error
          retention-days: 14
