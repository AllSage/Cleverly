name: cleverly

services:
  cleverly:
    container_name: ${CLEVERLY_CONTAINER_NAME:-cleverly}
    image: ${CLEVERLY_IMAGE:-cleverly:local}
    build:
      context: .
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    user: "${PUID:-1000}:${PGID:-1000}"
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=${CLEVERLY_TMPFS_SIZE:-1g},mode=1777
      - /run:size=64m,mode=755
      - /var/tmp:size=256m,mode=1777
    pids_limit: ${CLEVERLY_PIDS_LIMIT:-4096}
    networks:
      - offline_private
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Cookbook remote-server SSH identity. Cleverly can generate a key here;
      # add the shown public key to each remote server's authorized_keys.
      - ./data/ssh:/app/.ssh
      # General runtime cache for fastembed, browser/MCP helpers, and packages.
      - ./data/cache:/app/.cache
      # Cookbook local model cache. Inside Docker, "Local" means the Cleverly
      # container, so persist its HuggingFace cache under ./data/huggingface.
      - ./data/huggingface:/app/.cache/huggingface
      # Cookbook-installed Python CLIs/packages (vLLM, llama-cpp-python, etc.)
      # land under /app/.local for the cleverly user.
      - ./data/local:/app/.local
      # npm/npx cache for optional MCP helpers without writing to the image.
      - ./data/npm-cache:/app/.npm
    env_file:
      - path: .env
        required: false
    environment:
      CLEVERLY_OFFLINE: "1"
      # Default offline mode avoids embedding model downloads on first boot.
      # Set to "1" only after pre-seeding FASTEMBED_CACHE_PATH with the model.
      CLEVERLY_OFFLINE_EMBEDDINGS: "0"
      SEARXNG_INSTANCE: ""
      OPENAI_API_KEY: ""
      RESEARCH_LLM_ENDPOINT: ""
      OLLAMA_BASE_URL: ""
      LLM_HOSTS: ""
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      DATA_DIR: /app/data
      XDG_CACHE_HOME: /app/data/cache
      HF_HOME: /app/.cache/huggingface
      FASTEMBED_CACHE_PATH: /app/data/cache/fastembed
      npm_config_cache: /app/.npm
      PYTHONDONTWRITEBYTECODE: "1"
      # PUID / PGID are the user/group the container runs as. 1000 is the
      # default first user on most Linux installs. Override in .env if needed:
      #   PUID=1001
      #   PGID=1001
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    depends_on:
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped

  cleverly_proxy:
    container_name: ${CLEVERLY_PROXY_CONTAINER_NAME:-cleverly-proxy}
    image: ${CLEVERLY_IMAGE:-cleverly:local}
    user: "${PUID:-1000}:${PGID:-1000}"
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    entrypoint: ["python", "/app/docker/tcp_proxy.py"]
    command: ["0.0.0.0", "7000", "cleverly", "7000"]
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-7000}:7000"
    networks:
      - offline_private
      - offline_edge
    depends_on:
      - cleverly
    restart: unless-stopped

  chromadb:
    image: docker.io/chromadb/chroma:latest
    init: true
    security_opt:
      - no-new-privileges:true
    networks:
      - offline_private
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128m,mode=1777
    networks:
      - offline_private
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -s /etc/searxng/settings.yml ] || grep -q 'cleverly-local-searxng-json-2026-05-30\|__SEARXNG_SECRET__' /etc/searxng/settings.yml; then
          secret="$${SEARXNG_SECRET:-}"
          if [ -z "$$secret" ]; then
            secret="$$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          fi
          sed "s|__SEARXNG_SECRET__|$$secret|g" /tmp/searxng-settings.yml.template > /etc/searxng/settings.yml
        fi
        exec /usr/local/searxng/entrypoint.sh
    volumes:
      - searxng-data:/etc/searxng
      - ./config/searxng/settings.yml:/tmp/searxng-settings.yml.template:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5).read(1)\""]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  ntfy:
    image: docker.io/binwiederhier/ntfy
    init: true
    security_opt:
      - no-new-privileges:true
    command: serve
    networks:
      - offline_private
    volumes:
      - ntfy-cache:/var/cache/ntfy
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL:-http://localhost:8091}
    restart: unless-stopped

networks:
  offline_private:
    internal: true
  offline_edge:
    driver: bridge

volumes:
  searxng-data:
  chromadb-data:
  ntfy-cache:
