# Compatibility overlay for older runbooks.
#
# docker-compose.yml is now offline-by-default: Cleverly runs only on an
# internal Docker network, and a tiny no-data proxy publishes localhost:7000 to
# the host. Keeping this file lets older commands continue to work while
# reinforcing the same offline settings.
services:
  cleverly:
    networks:
      - offline_private
    environment:
      CLEVERLY_OFFLINE: "1"
      # Default offline mode avoids embedding model downloads on first boot.
      # Set to "1" only after pre-seeding FASTEMBED_CACHE_PATH with the model.
      CLEVERLY_OFFLINE_EMBEDDINGS: "0"
      SEARXNG_INSTANCE: ""
      OPENAI_API_KEY: ""
      RESEARCH_LLM_ENDPOINT: ""
      OLLAMA_BASE_URL: ""
      LLM_HOSTS: ""

  chromadb:
    networks:
      - offline_private

  searxng:
    networks:
      - offline_private

  ntfy:
    networks:
      - offline_private
